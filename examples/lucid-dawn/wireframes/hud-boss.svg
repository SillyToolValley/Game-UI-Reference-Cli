<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="lead-dot" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#1e3a8a"/></marker>
    <style>
      .frame{fill:#0f1422;stroke:#3b4a6b;stroke-width:2;} .zone{fill:#1a2336;stroke:#2c3a57;stroke-width:1;}
      .region{fill:none;stroke:#5b8def;stroke-width:2;stroke-dasharray:6 4;} .regionC{fill:none;stroke:#5b8def;stroke-width:2;stroke-dasharray:6 4;}
      .lead{fill:none;stroke:#1e3a8a;stroke-width:1.5;marker-start:url(#lead-dot);} .badge{fill:#1e3a8a;}
      .badgeT{fill:#fff;font-size:17px;font-weight:700;text-anchor:middle;dominant-baseline:central;}
      .callT{fill:#dbe4f5;font-size:18px;} .callTb{fill:#fff;font-size:18px;font-weight:700;} .ghost{fill:#6b7796;font-size:16px;} .player{fill:#8fd6ff;} .title{fill:#fff;font-size:22px;font-weight:700;}
    </style>
  </defs>
  <rect x="0" y="0" width="1760" height="820" fill="#0b0f1a"/>
  <text x="200" y="38" class="title">In-game HUD (boss / hidden boss) — top-center takeover</text>
  <rect x="200" y="50" width="1280" height="720" rx="10" class="frame"/>
  <rect x="560" y="70" width="560" height="74" rx="6" class="zone"/><text x="600" y="62" class="ghost">top-center slot (empty → boss owns)</text>
  <rect x="220" y="92" width="300" height="150" rx="6" class="zone"/><text x="232" y="262" class="ghost">clock stays top-left in boss fight</text>
  <circle cx="840" cy="430" r="20" class="player"/><text x="812" y="472" class="ghost">Player</text>
  <rect x="640" y="540" width="400" height="40" rx="6" class="zone"/><text x="660" y="532" class="ghost">Seal trial banner (during trial)</text>
  <g id="c1"><circle cx="275" cy="130" r="42" class="regionC"/><polyline class="lead" points="233,130 150,130 150,120 60,120"/><g transform="translate(275,130)"><circle r="15" class="badge"/><text class="badgeT">2</text></g><g transform="translate(10,120)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">2</text><text x="34" y="0" class="callTb" dominant-baseline="central">Alarm clock</text><text x="34" y="20" class="callT" dominant-baseline="central">top-left · kept</text></g></g>
  <g id="c2"><rect x="230" y="185" width="250" height="22" rx="5" class="region"/><polyline class="lead" points="230,196 150,196 150,210 60,210"/><g transform="translate(250,196)"><circle r="15" class="badge"/><text class="badgeT">3</text></g><g transform="translate(10,210)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">3</text><text x="34" y="0" class="callTb" dominant-baseline="central">Seal→Hidden</text><text x="34" y="20" class="callT" dominant-baseline="central">below clock</text></g></g>
  <g id="c3"><rect x="560" y="80" width="560" height="34" rx="5" class="region"/><polyline class="lead" points="560,97 360,97 360,80 60,80"/><g transform="translate(585,97)"><circle r="15" class="badge"/><text class="badgeT">10</text></g><g transform="translate(10,80)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">10</text><text x="34" y="0" class="callTb" dominant-baseline="central">Boss HP bar</text><text x="34" y="20" class="callT" dominant-baseline="central">top-center · segmented</text></g></g>
  <g id="c4"><rect x="1024" y="84" width="92" height="26" rx="4" class="region"/><polyline class="lead" points="1116,97 1300,97 1300,120 1530,120"/><g transform="translate(1070,97)"><circle r="15" class="badge"/><text class="badgeT">13</text></g><g transform="translate(1490,120)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">13</text><text x="34" y="0" class="callTb" dominant-baseline="central">Time inset</text><text x="34" y="20" class="callT" dominant-baseline="central">hidden boss only</text></g></g>
  <g id="c5"><rect x="600" y="120" width="480" height="14" rx="4" class="region"/><polyline class="lead" points="1080,127 1300,127 1300,210 1530,210"/><g transform="translate(625,127)"><circle r="15" class="badge"/><text class="badgeT">11</text></g><g transform="translate(1490,210)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">11</text><text x="34" y="0" class="callTb" dominant-baseline="central">Crack/Groggy</text><text x="34" y="20" class="callT" dominant-baseline="central">under boss HP</text></g></g>
  <g id="c6"><circle cx="840" cy="500" r="36" class="regionC"/><polyline class="lead" points="876,500 1320,500 1320,440 1530,440"/><g transform="translate(840,500)"><circle r="15" class="badge"/><text class="badgeT">12</text></g><g transform="translate(1490,440)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">12</text><text x="34" y="0" class="callTb" dominant-baseline="central">Counter window</text><text x="34" y="20" class="callT" dominant-baseline="central">0.7s after evade</text></g></g>
  <g id="c7"><rect x="640" y="540" width="400" height="40" rx="6" class="region"/><polyline class="lead" points="1040,560 1320,560 1320,620 1530,620"/><g transform="translate(665,560)"><circle r="15" class="badge"/><text class="badgeT">14</text></g><g transform="translate(1490,620)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">14</text><text x="34" y="0" class="callTb" dominant-baseline="central">Trial banner</text><text x="34" y="20" class="callT" dominant-baseline="central">during trial</text></g></g>
  <g id="c8"><rect x="560" y="725" width="520" height="20" rx="5" class="region"/><polyline class="lead" points="1080,735 1510,735 1510,720 1530,720"/><g transform="translate(590,735)"><circle r="15" class="badge"/><text class="badgeT">7</text></g><g transform="translate(1490,720)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">7</text><text x="34" y="0" class="callTb" dominant-baseline="central">Purify bar</text><text x="34" y="20" class="callT" dominant-baseline="central">30% in boss</text></g></g>
</svg>
