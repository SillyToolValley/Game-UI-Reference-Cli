      .t{fill:#eaf0fb;font-size:18px;font-weight:700;text-anchor:middle;} .ts{fill:#9fb3d6;font-size:13px;text-anchor:middle;}
      .edge{stroke:#7aa2e8;stroke-width:2;fill:none;marker-end:url(#arrow);} .elab{fill:#c4d2ec;font-size:12px;text-anchor:middle;}
