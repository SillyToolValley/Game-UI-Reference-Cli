<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7aa2e8"/></marker>
    <style>
      .menu{fill:#15233f;stroke:#4a6aa5;stroke-width:2;} .run{fill:#172a2a;stroke:#5bcf9e;stroke-width:2;}
