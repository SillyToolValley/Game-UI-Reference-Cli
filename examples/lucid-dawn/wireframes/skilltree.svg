<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="lead-dot" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#1e3a8a"/></marker>
    <style>
      .frame{fill:#0f1422;stroke:#3b4a6b;stroke-width:2;} .zone{fill:#1a2336;stroke:#2c3a57;stroke-width:1;}
      .node{fill:#1c2a47;stroke:#5b6f99;stroke-width:2;} .edge{stroke:#44598a;stroke-width:3;fill:none;}
      .region{fill:none;stroke:#5b8def;stroke-width:2;stroke-dasharray:6 4;} .regionC{fill:none;stroke:#5b8def;stroke-width:2;stroke-dasharray:6 4;}
      .lead{fill:none;stroke:#1e3a8a;stroke-width:1.5;marker-start:url(#lead-dot);} .badge{fill:#1e3a8a;}
      .badgeT{fill:#fff;font-size:17px;font-weight:700;text-anchor:middle;dominant-baseline:central;}
      .callT{fill:#dbe4f5;font-size:18px;} .callTb{fill:#fff;font-size:18px;font-weight:700;} .ghost{fill:#6b7796;font-size:16px;} .title{fill:#fff;font-size:22px;font-weight:700;}
    </style>
  </defs>
  <rect x="0" y="0" width="1760" height="820" fill="#0b0f1a"/>
  <text x="200" y="38" class="title">Boss reward step 1 — Skill tree (spend skill point) — 16:9</text>
  <rect x="200" y="50" width="1280" height="720" rx="10" class="frame"/>
  <rect x="560" y="220" width="620" height="320" rx="8" class="zone"/>
  <line class="edge" x1="700" y1="380" x2="870" y2="380"/><line class="edge" x1="870" y1="380" x2="1040" y2="380"/><line class="edge" x1="870" y1="380" x2="870" y2="290"/><line class="edge" x1="870" y1="380" x2="870" y2="470"/>
  <circle cx="700" cy="380" r="30" class="node"/><circle cx="870" cy="290" r="30" class="node"/><circle cx="870" cy="380" r="30" class="node"/><circle cx="870" cy="470" r="30" class="node"/><circle cx="1040" cy="380" r="30" class="node"/>
  <rect x="980" y="560" width="300" height="150" rx="8" class="zone"/><text x="1000" y="552" class="ghost">Selected node info</text>
  <g id="c1"><rect x="230" y="80" width="320" height="44" rx="6" class="region"/><polyline class="lead" points="230,102 150,102 150,90 60,90"/><g transform="translate(252,102)"><circle r="15" class="badge"/><text class="badgeT">1</text></g><g transform="translate(10,90)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">1</text><text x="34" y="0" class="callTb" dominant-baseline="central">Char·tree name</text><text x="34" y="20" class="callT" dominant-baseline="central">top-left</text></g></g>
  <g id="c2"><rect x="560" y="220" width="620" height="320" rx="8" class="region"/><polyline class="lead" points="560,400 150,400 150,360 60,360"/><g transform="translate(585,242)"><circle r="15" class="badge"/><text class="badgeT">4</text></g><g transform="translate(10,360)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">4</text><text x="34" y="0" class="callTb" dominant-baseline="central">Node graph</text><text x="34" y="20" class="callT" dominant-baseline="central">center · prereq</text></g></g>
  <g id="c3"><rect x="620" y="690" width="440" height="44" rx="6" class="region"/><polyline class="lead" points="620,712 150,712 150,640 60,640"/><g transform="translate(645,712)"><circle r="15" class="badge"/><text class="badgeT">7</text></g><g transform="translate(10,640)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">7</text><text x="34" y="0" class="callTb" dominant-baseline="central">Next: item 4-pick</text><text x="34" y="20" class="callT" dominant-baseline="central">bottom · after</text></g></g>
  <g id="c4"><rect x="1180" y="80" width="240" height="44" rx="6" class="region"/><polyline class="lead" points="1420,102 1490,102 1490,90 1530,90"/><g transform="translate(1202,102)"><circle r="15" class="badge"/><text class="badgeT">2</text></g><g transform="translate(1490,90)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">2</text><text x="34" y="0" class="callTb" dominant-baseline="central">Skill point</text><text x="34" y="20" class="callT" dominant-baseline="central">top-right · left</text></g></g>
  <g id="c5"><rect x="620" y="80" width="440" height="40" rx="6" class="region"/><polyline class="lead" points="620,120 150,120 150,140 60,140"/><g transform="translate(645,100)"><circle r="15" class="badge"/><text class="badgeT">3</text></g><g transform="translate(10,140)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">3</text><text x="34" y="0" class="callTb" dominant-baseline="central">Protect 8s</text><text x="34" y="20" class="callT" dominant-baseline="central">take your time</text></g></g>
  <g id="c6"><circle cx="1040" cy="380" r="32" class="regionC"/><polyline class="lead" points="1072,380 1485,380 1485,460 1530,460"/><g transform="translate(1040,380)"><circle r="15" class="badge"/><text class="badgeT">5</text></g><g transform="translate(1490,460)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">5</text><text x="34" y="0" class="callTb" dominant-baseline="central">Node state</text><text x="34" y="20" class="callT" dominant-baseline="central">lock/avail/owned</text></g></g>
  <g id="c7"><rect x="980" y="560" width="300" height="150" rx="8" class="region"/><polyline class="lead" points="1280,600 1490,600 1490,580 1530,580"/><g transform="translate(1002,578)"><circle r="15" class="badge"/><text class="badgeT">6</text></g><g transform="translate(1490,580)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">6</text><text x="34" y="0" class="callTb" dominant-baseline="central">Node info</text><text x="34" y="20" class="callT" dominant-baseline="central">effect·cost·prereq</text></g></g>
