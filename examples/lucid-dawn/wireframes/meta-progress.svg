  <g id="c3"><rect x="230" y="160" width="620" height="500" rx="8" class="region"/><polyline class="lead" points="230,320 150,320 150,300 60,300"/><g transform="translate(252,182)"><circle r="15" class="badge"/><text class="badgeT">3</text></g><g transform="translate(10,300)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">3</text><text x="34" y="0" class="callTb" dominant-baseline="central">Unlock list</text><text x="34" y="20" class="callT" dominant-baseline="central">row: name·effect·state</text></g></g>
  <g id="c4"><rect x="260" y="200" width="560" height="44" rx="6" class="region"/><polyline class="lead" points="260,222 158,222 158,200 60,200"/><g transform="translate(282,222)"><circle r="15" class="badge"/><text class="badgeT">4</text></g><g transform="translate(10,200)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">4</text><text x="34" y="0" class="callTb" dominant-baseline="central">Item state</text><text x="34" y="20" class="callT" dominant-baseline="central">unlocked/locked</text></g></g>
  <g id="c7"><rect x="230" y="690" width="200" height="44" rx="6" class="region"/><polyline class="lead" points="230,712 150,712 150,700 60,700"/><g transform="translate(252,712)"><circle r="15" class="badge"/><text class="badgeT">7</text></g><g transform="translate(10,700)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">7</text><text x="34" y="0" class="callTb" dominant-baseline="central">Back · input</text><text x="34" y="20" class="callT" dominant-baseline="central">bottom-left</text></g></g>
  <g id="c2"><rect x="1080" y="80" width="200" height="44" rx="6" class="region"/><polyline class="lead" points="1280,102 1490,102 1490,90 1530,90"/><g transform="translate(1102,102)"><circle r="15" class="badge"/><text class="badgeT">2</text></g><g transform="translate(1490,90)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">2</text><text x="34" y="0" class="callTb" dominant-baseline="central">Currency</text><text x="34" y="20" class="callT" dominant-baseline="central">shards/stardust/core</text></g></g>
  <g id="c5"><rect x="900" y="160" width="380" height="380" rx="8" class="region"/><polyline class="lead" points="1280,300 1490,300 1490,360 1530,360"/><g transform="translate(925,182)"><circle r="15" class="badge"/><text class="badgeT">5</text></g><g transform="translate(1490,360)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">5</text><text x="34" y="0" class="callTb" dominant-baseline="central">Item desc·cond</text><text x="34" y="20" class="callT" dominant-baseline="central">right panel</text></g></g>
  <g id="c6"><rect x="900" y="690" width="380" height="44" rx="6" class="region"/><polyline class="lead" points="1280,712 1490,712 1490,700 1530,700"/><g transform="translate(925,712)"><circle r="15" class="badge"/><text class="badgeT">6</text></g><g transform="translate(1490,700)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">6</text><text x="34" y="0" class="callTb" dominant-baseline="central">Unlock button</text><text x="34" y="20" class="callT" dominant-baseline="central">spend currency</text></g></g>
