<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="lead-dot" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#1e3a8a"/></marker>
    <style>
      .frame{fill:#0f1422;stroke:#3b4a6b;stroke-width:2;} .zone{fill:#1a2336;stroke:#2c3a57;stroke-width:1;}
      .item{fill:#16203a;stroke:#33507f;stroke-width:1.5;}
      .region{fill:none;stroke:#5b8def;stroke-width:2;stroke-dasharray:6 4;}
      .lead{fill:none;stroke:#1e3a8a;stroke-width:1.5;marker-start:url(#lead-dot);} .badge{fill:#1e3a8a;}
      .badgeT{fill:#fff;font-size:17px;font-weight:700;text-anchor:middle;dominant-baseline:central;}
      .callT{fill:#dbe4f5;font-size:18px;} .callTb{fill:#fff;font-size:18px;font-weight:700;} .ghost{fill:#6b7796;font-size:16px;} .title{fill:#fff;font-size:22px;font-weight:700;}
    </style>
  </defs>
  <rect x="0" y="0" width="1760" height="820" fill="#0b0f1a"/>
  <text x="200" y="38" class="title">Meta Progress — Permanent unlocks / Codex (no purchase) — 16:9</text>
  <rect x="200" y="50" width="1280" height="720" rx="10" class="frame"/>
  <rect x="230" y="160" width="620" height="500" rx="8" class="zone"/>
  <rect x="260" y="200" width="560" height="44" rx="6" class="item"/><rect x="260" y="256" width="560" height="44" rx="6" class="item"/><rect x="260" y="312" width="560" height="44" rx="6" class="item"/><text x="250" y="152" class="ghost">Upgrade/unlock list</text>
