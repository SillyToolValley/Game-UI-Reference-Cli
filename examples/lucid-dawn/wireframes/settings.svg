  <g id="c2"><rect x="230" y="160" width="560" height="500" rx="8" class="region"/><polyline class="lead" points="230,310 150,310 150,300 60,300"/><g transform="translate(252,182)"><circle r="15" class="badge"/><text class="badgeT">2</text></g><g transform="translate(10,300)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">2</text><text x="34" y="0" class="callTb" dominant-baseline="central">Option list</text><text x="34" y="20" class="callT" dominant-baseline="central">sliders·toggles</text></g></g>
  <g id="c3"><rect x="260" y="260" width="480" height="40" rx="6" class="region"/><polyline class="lead" points="260,280 158,280 158,210 60,210"/><g transform="translate(282,280)"><circle r="15" class="badge"/><text class="badgeT">3</text></g><g transform="translate(10,210)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">3</text><text x="34" y="0" class="callTb" dominant-baseline="central">Option control</text><text x="34" y="20" class="callT" dominant-baseline="central">slider/toggle</text></g></g>
  <g id="c5"><rect x="260" y="480" width="480" height="140" rx="6" class="region"/><polyline class="lead" points="260,550 150,550 150,620 60,620"/><g transform="translate(282,500)"><circle r="15" class="badge"/><text class="badgeT">5</text></g><g transform="translate(10,620)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">5</text><text x="34" y="0" class="callTb" dominant-baseline="central">Accessibility group</text><text x="34" y="20" class="callT" dominant-baseline="central">colorblind·shake·subs</text></g></g>
  <g id="c4"><rect x="830" y="160" width="450" height="360" rx="8" class="region"/><polyline class="lead" points="1280,330 1490,330 1490,300 1530,300"/><g transform="translate(855,182)"><circle r="15" class="badge"/><text class="badgeT">4</text></g><g transform="translate(1490,300)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">4</text><text x="34" y="0" class="callTb" dominant-baseline="central">Description panel</text><text x="34" y="20" class="callT" dominant-baseline="central">right · explain</text></g></g>
  <g id="c6"><rect x="830" y="690" width="450" height="44" rx="6" class="region"/><polyline class="lead" points="1280,712 1490,712 1490,700 1530,700"/><g transform="translate(855,712)"><circle r="15" class="badge"/><text class="badgeT">6</text></g><g transform="translate(1490,700)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">6</text><text x="34" y="0" class="callTb" dominant-baseline="central">Apply·revert·back</text><text x="34" y="20" class="callT" dominant-baseline="central">bottom · input</text></g></g>
