<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="lead-dot" markerWidth="8" markerHeight="8" refX="4" refY="4"><circle cx="4" cy="4" r="3" fill="#1e3a8a"/></marker>
    <style>
      .frame{fill:#0f1422;stroke:#3b4a6b;stroke-width:2;} .zone{fill:#1a2336;stroke:#2c3a57;stroke-width:1;}
      .region{fill:none;stroke:#5b8def;stroke-width:2;stroke-dasharray:6 4;} .regionC{fill:none;stroke:#5b8def;stroke-width:2;stroke-dasharray:6 4;}
      .lead{fill:none;stroke:#1e3a8a;stroke-width:1.5;marker-start:url(#lead-dot);} .badge{fill:#1e3a8a;}
      .badgeT{fill:#fff;font-size:17px;font-weight:700;text-anchor:middle;dominant-baseline:central;}
      .callT{fill:#dbe4f5;font-size:18px;} .callTb{fill:#fff;font-size:18px;font-weight:700;} .ghost{fill:#6b7796;font-size:16px;} .player{fill:#8fd6ff;} .title{fill:#fff;font-size:22px;font-weight:700;}
    </style>
  </defs>
  <rect x="0" y="0" width="1760" height="820" fill="#0b0f1a"/>
  <text x="200" y="38" class="title">In-game HUD (combat) — 16:9 (1920x1080 ref)</text>
  <rect x="200" y="50" width="1280" height="720" rx="10" class="frame"/>
  <rect x="210" y="60" width="1260" height="16" rx="4" class="zone"/><text x="232" y="84" class="ghost">XP strip</text>
  <rect x="220" y="92" width="300" height="190" rx="6" class="zone"/><text x="232" y="300" class="ghost">top-left vitals cluster</text>
  <rect x="540" y="690" width="640" height="64" rx="6" class="zone"/><text x="560" y="682" class="ghost">bottom skill/resource tray</text>
  <circle cx="840" cy="410" r="20" class="player"/><text x="812" y="452" class="ghost">Player</text>
  <g id="c1"><rect x="210" y="60" width="1260" height="16" rx="4" class="region"/><polyline class="lead" points="1470,68 1500,68 1500,72 1530,72"/><g transform="translate(232,68)"><circle r="15" class="badge"/><text class="badgeT">1</text></g><g transform="translate(1490,72)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">1</text><text x="34" y="0" class="callTb" dominant-baseline="central">XP bar</text><text x="34" y="20" class="callT" dominant-baseline="central">top · always</text></g></g>
  <g id="c2"><circle cx="275" cy="130" r="42" class="regionC"/><polyline class="lead" points="233,130 150,130 150,120 60,120"/><g transform="translate(275,130)"><circle r="15" class="badge"/><text class="badgeT">2</text></g><g transform="translate(10,120)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">2</text><text x="34" y="0" class="callTb" dominant-baseline="central">Alarm clock</text><text x="34" y="20" class="callT" dominant-baseline="central">top-left · always</text></g></g>
  <g id="c3"><rect x="230" y="185" width="250" height="22" rx="5" class="region"/><polyline class="lead" points="230,196 158,196 158,190 60,190"/><g transform="translate(250,196)"><circle r="15" class="badge"/><text class="badgeT">3</text></g><g transform="translate(10,190)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">3</text><text x="34" y="0" class="callTb" dominant-baseline="central">Seal gauge</text><text x="34" y="20" class="callT" dominant-baseline="central">below clock</text></g></g>
  <g id="c4"><rect x="230" y="220" width="265" height="20" rx="5" class="region"/><polyline class="lead" points="230,230 150,230 150,240 60,240"/><g transform="translate(250,230)"><circle r="15" class="badge"/><text class="badgeT">4</text></g><g transform="translate(10,240)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">4</text><text x="34" y="0" class="callTb" dominant-baseline="central">HP / Shield</text><text x="34" y="20" class="callT" dominant-baseline="central">vitals · always</text></g></g>
  <g id="c5"><rect x="230" y="250" width="205" height="16" rx="5" class="region"/><polyline class="lead" points="230,258 158,258 158,285 60,285"/><g transform="translate(250,258)"><circle r="15" class="badge"/><text class="badgeT">5</text></g><g transform="translate(10,285)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">5</text><text x="34" y="0" class="callTb" dominant-baseline="central">Dream Energy</text><text x="34" y="20" class="callT" dominant-baseline="central">near HP</text></g></g>
  <g id="c6"><rect x="230" y="595" width="180" height="34" rx="6" class="region"/><polyline class="lead" points="230,612 150,612 150,610 60,610"/><g transform="translate(250,612)"><circle r="15" class="badge"/><text class="badgeT">6</text></g><g transform="translate(10,610)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">6</text><text x="34" y="0" class="callTb" dominant-baseline="central">Lucid combo</text><text x="34" y="20" class="callT" dominant-baseline="central">low-left · on evade</text></g></g>
  <g id="c7"><rect x="560" y="725" width="520" height="20" rx="5" class="region"/><polyline class="lead" points="1080,735 1510,735 1510,755 1530,755"/><g transform="translate(590,735)"><circle r="15" class="badge"/><text class="badgeT">7</text></g><g transform="translate(1490,755)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">7</text><text x="34" y="0" class="callTb" dominant-baseline="central">Purify bar</text><text x="34" y="20" class="callT" dominant-baseline="central">bottom-mid · always</text></g></g>
  <g id="c8"><rect x="900" y="690" width="210" height="62" rx="6" class="region"/><polyline class="lead" points="1110,700 1500,700 1500,640 1530,640"/><g transform="translate(925,704)"><circle r="15" class="badge"/><text class="badgeT">8</text></g><g transform="translate(1490,640)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">8</text><text x="34" y="0" class="callTb" dominant-baseline="central">Skills Q·E</text><text x="34" y="20" class="callT" dominant-baseline="central">bottom · always</text></g></g>
  <g id="c9"><rect x="1260" y="690" width="120" height="62" rx="6" class="region"/><polyline class="lead" points="1380,710 1505,710 1505,705 1530,705"/><g transform="translate(1300,704)"><circle r="15" class="badge"/><text class="badgeT">9</text></g><g transform="translate(1490,705)"><circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">9</text><text x="34" y="0" class="callTb" dominant-baseline="central">Ultimate R</text><text x="34" y="20" class="callT" dominant-baseline="central">low-right · always</text></g></g>
</svg>
