<!--
  ANNOTATED WIREFRAME KIT  (copy this file per screen, rename, fill in)
  =====================================================================
  Goal: a wireframe of one screen where every UI element is (1) boxed/circled,
        (2) numbered, (3) connected by a LEADER LINE pulled OUTSIDE the frame
        to a short label. Full descriptions live in the numbered legend TABLE
        in the markdown next to this SVG — keep SVG labels SHORT.

  COORDINATE CONTRACT (do not change unless you also move everything):
    viewBox 0 0 1760 820   (widened from 1680 so CJK right-gutter labels don't clip)
    SCREEN FRAME (the 16:9 game screen)  : x=200 y=50  w=1280 h=720
    LEFT  GUTTER (callout labels live here): x   0..190   (label text left-anchored)
    RIGHT GUTTER (callout labels live here): x 1490..1760 (270px; enough for ~12 Hangul)
    Place each callout label in the gutter NEAREST its element. Stagger labels
    vertically (>=44px apart) so leader lines never cross. A leader makes
    EXACTLY ONE vertical bend between two horizontal runs (a single staircase
    step) — see the <polyline> points pattern. No extra stubs.

  LABEL LENGTH BUDGET (CJK-aware): the budget is in PIXELS, not characters. A
  Hangul/CJK glyph at font-size 18 is ~18px (~2x a Latin char). Right gutter is
  270px wide, so keep right-gutter label text <= ~12 Hangul (or ~22 Latin). Put
  the real spec in the legend table, not the SVG. If a right label would clip,
  shorten it (move detail to the legend) — never let text pass x=1760.

  THE 5 REUSABLE PIECES are defined as <symbol>/<g> patterns below. Copy a
  block, change x/y/number/text. Numbering: top-to-bottom, then left-to-right,
  reading order. Region shape: RECTANGLE for panels/bars/areas, CIRCLE for a
  single point element (icon, single button, indicator dot).

  LEGIBILITY DO/DON'T:
    DO  keep label text <= ~22 chars; put the real spec in the legend table.
    DO  group each callout (region + badge + leader + label) in one <g id="cN">.
    DO  use rx on rects (rounded) and dashed strokes so regions read as overlays.
    DON'T cross leader lines; DON'T overlap badges; DON'T shrink text below 16px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1760 820" font-family="Segoe UI, Arial, sans-serif">

  <!-- ===== palette / reusable defs ===== -->
  <defs>
    <!-- arrow/dot marker placed at the element end of a leader line -->
    <marker id="lead-dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#1e3a8a"/>
    </marker>
    <style>
      .frame   { fill:#0f1422; stroke:#3b4a6b; stroke-width:2; }
      .zone    { fill:#1a2336; stroke:#2c3a57; stroke-width:1; }      /* layout zones inside the screen */
      .region  { fill:none; stroke:#5b8def; stroke-width:2; stroke-dasharray:6 4; }   /* rectangle region */
      .regionC { fill:none; stroke:#5b8def; stroke-width:2; stroke-dasharray:6 4; }   /* circle region */
      .lead    { fill:none; stroke:#1e3a8a; stroke-width:1.5; marker-start:url(#lead-dot); }
      .badge   { fill:#1e3a8a; }
      .badgeT  { fill:#ffffff; font-size:17px; font-weight:700; text-anchor:middle; dominant-baseline:central; }
      .callT   { fill:#dbe4f5; font-size:18px; }
      .callTb  { fill:#ffffff; font-size:18px; font-weight:700; }
      .ghost   { fill:#6b7796; font-size:16px; }                       /* placeholder labels inside zones */
      .title   { fill:#ffffff; font-size:22px; font-weight:700; }
    </style>
  </defs>

  <!-- ===== full-canvas background (MUST be first drawn element) =====
       Without this, light gutter text renders on the page background and VANISHES
       in GitHub light mode / transparent viewers. Always ship a background rect. -->
  <rect x="0" y="0" width="1760" height="820" fill="#0b0f1a"/>

  <!-- ===== screen frame ===== -->
  <text x="200" y="38" class="title">SCREEN TITLE — 16:9 (1920x1080 reference)</text>
  <rect x="200" y="50" width="1280" height="720" rx="10" class="frame"/>

  <!-- ===== OPTIONAL: sketch the layout zones first (light boxes) so the wireframe reads as a real screen.
            Replace these with your screen's actual blocks. ===== -->
  <rect x="220" y="70"  width="360" height="150" rx="6" class="zone"/>
  <text x="240" y="100" class="ghost">top-left cluster</text>
  <rect x="560" y="70"  width="560" height="60"  rx="6" class="zone"/>
  <text x="580" y="105" class="ghost">top-center</text>
  <rect x="500" y="560" width="680" height="180" rx="6" class="zone"/>
  <text x="520" y="585" class="ghost">bottom-center cluster</text>

  <!-- =======================================================================
       CALLOUT TEMPLATE — copy one <g> per UI element. Two worked examples:
       one using the LEFT gutter, one using the RIGHT gutter.
       ======================================================================= -->

  <!-- (1) LEFT-gutter callout: RECTANGLE region -> bends left -> label in left gutter.
          region center ~ (400,145); badge sits on the region; leader goes to (190, labelY). -->
  <g id="c1">
    <rect x="222" y="72" width="356" height="146" rx="6" class="region"/>
    <!-- leader: start at region's left-mid (222,145) -> out to x=150 -> down/up to label y=120 -->
    <polyline class="lead" points="222,145 150,145 150,120 60,120"/>
    <!-- numbered badge on the region -->
    <g transform="translate(238,90)"><circle r="15" class="badge"/><text class="badgeT">1</text></g>
    <!-- callout label in gutter (badge + short name) -->
    <g transform="translate(10,112)">
      <circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">1</text>
      <text x="34" y="0" class="callTb" dominant-baseline="central">알람 시계</text>
      <text x="34" y="20" class="callT" dominant-baseline="central">top-left · 항상</text>
    </g>
  </g>

  <!-- (2) RIGHT-gutter callout: CIRCLE region -> bends right -> label in right gutter. -->
  <g id="c2">
    <circle cx="840" cy="100" r="34" class="regionC"/>
    <polyline class="lead" points="874,100 1300,100 1300,120 1530,120"/>
    <g transform="translate(840,100)"><circle r="15" class="badge"/><text class="badgeT">2</text></g>
    <g transform="translate(1490,112)">
      <circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">2</text>
      <text x="34" y="0" class="callTb" dominant-baseline="central">보스 HP 바</text>
      <text x="34" y="20" class="callT" dominant-baseline="central">top-center · 보스전</text>
    </g>
  </g>

  <!-- (3) bottom element -> right gutter, lower. -->
  <g id="c3">
    <rect x="502" y="562" width="676" height="176" rx="6" class="region"/>
    <polyline class="lead" points="1178,650 1320,650 1320,640 1530,640"/>
    <g transform="translate(1158,582)"><circle r="15" class="badge"/><text class="badgeT">3</text></g>
    <g transform="translate(1490,632)">
      <circle cx="14" cy="0" r="13" class="badge"/><text x="14" y="0" class="badgeT">3</text>
      <text x="34" y="0" class="callTb" dominant-baseline="central">스킬/궁극기 슬롯</text>
      <text x="34" y="20" class="callT" dominant-baseline="central">bottom · 항상</text>
    </g>
  </g>

  <!-- ...repeat <g id="cN"> for every element. Keep numbers sequential and in
       reading order. Then fill the LEGEND TABLE in the markdown:
       | # | 요소 | 위치 | 표시조건 | 동작/상태 | 데이터 바인딩 | UX 근거 | -->

</svg>
